name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Run tests
        run: uv run pytest

